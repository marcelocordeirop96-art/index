<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinesioterapia</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

header{
    background:black;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#1c1c1c;
    margin:12px;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
}

.card:hover{
    background:#2a2a2a;
}

iframe{
    width:90%;
    height:220px;
    margin-top:20px;
    border-radius:12px;
    border:none;
}
</style>
</head>

<body>

<header>
CINESIOTERAPIA • CORPO MÁGICO
</header>

<div class="container">

<h2>Módulos</h2>

<div class="card" onclick="abrirVideo(1)">
Módulo 1 — Consciência Corporal
</div>

<div class="card" onclick="abrirVideo(2)">
Módulo 2 — Correção Postural
</div>

<div id="player"></div>

</div>

<script>

function abrirVideo(modulo){

let area = document.getElementById("player");

if(modulo === 1){
area.innerHTML = `
<h3>Módulo 1 — Consciência Corporal</h3>
<iframe src="https://www.youtube.com/embed/9blrNlHImUI" allowfullscreen></iframe>
`;
}

if(modulo === 2){
area.innerHTML = `
<h3>Módulo 2 — Correção Postural</h3>
<p>Em construção...</p>
`;
}

}

</script>

</body>
</html>
