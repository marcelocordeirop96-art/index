<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinesioterapia</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:black;
padding:20px;
font-size:22px;
}

button{
margin:20px;
padding:15px 25px;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
background:#c2b280;
}

iframe{
margin-top:20px;
width:90%;
height:220px;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<header>CINESIOTERAPIA • CORPO MÁGICO</header>

<button onclick="mostrarVideo()">Abrir Módulo 1</button>

<div id="video"></div>

<script>

function mostrarVideo(){

document.getElementById("video").innerHTML = `
<iframe 
src="https://www.youtube.com/embed/9blrNlHImUI"
allowfullscreen>
</iframe>
`;

}

</script>

</body>
</html>
